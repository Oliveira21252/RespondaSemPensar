<style>

.grain{position:fixed;inset:0;z-index:1;pointer-events:none;opacity:.03;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")}

@keyframes bm{0%,100%{transform:translate(0,0)}50%{transform:translate(clamp(20px,5vw,70px),clamp(15px,4vw,50px))}}
@keyframes bm2{0%,100%{transform:translate(0,0)}50%{transform:translate(clamp(-15px,-4vw,-60px),clamp(-10px,-3vw,-40px))}}

.pg{width:100%;max-width:640px;display:flex;flex-direction:column;height:100%;max-height:100dvh}
.pg.off{display:none}
.orb{width:clamp(48px,12vw,88px);height:clamp(48px,12vw,88px);border-radius:50%;position:relative;display:flex;align-items:center;justify-content:center;font-size:clamp(1.2rem,4vw,2.3rem);transform-style:preserve-3d;flex-shrink:0;background:radial-gradient(circle at 30% 25%,rgba(255,255,255,.14) 0%,transparent 55%),radial-gradient(circle at 72% 78%,rgba(0,0,0,.45) 0%,transparent 55%),rgba(255,255,255,.025);box-shadow:0 6px 24px rgba(0,0,0,.5),0 2px 6px rgba(0,0,0,.3),inset 0 2px 5px rgba(255,255,255,.1),inset 0 -2px 5px rgba(0,0,0,.3);animation:of 5s ease-in-out infinite}
.orb::before{content:'';position:absolute;inset:-3px;border-radius:50%;border:1.5px solid rgba(255,255,255,.06);animation:rs 10s linear infinite;transform-style:preserve-3d;transform:rotateX(65deg)}
.orb::after{content:'';position:absolute;top:clamp(4px,1.5vw,8px);left:clamp(6px,2vw,14px);width:clamp(12px,3.5vw,26px);height:clamp(5px,1.5vw,11px);border-radius:50%;background:rgba(255,255,255,.08);filter:blur(3px)}
@keyframes of{0%,100%{transform:rotateY(0) rotateX(8deg) translateY(0)}25%{transform:rotateY(14deg) rotateX(3deg) translateY(-6px)}50%{transform:rotateY(0) rotateX(-5deg) translateY(-2px)}75%{transform:rotateY(-14deg) rotateX(3deg) translateY(-8px)}}
@keyframes rs{to{transform:rotateX(65deg) rotateZ(360deg)}}
.orb.sel{animation:os 3s ease-in-out infinite}
@keyframes os{0%,100%{transform:rotateY(0) rotateX(8deg) scale(1.08)}50%{transform:rotateY(20deg) rotateX(5deg) scale(1.14)}}
.oc{background:rgba(255,255,255,.03);backdrop-filter:blur(10px);border:1.5px solid rgba(255,255,255,.06);border-radius:clamp(10px,2vw,16px);padding:clamp(10px,2.5vw,22px) clamp(8px,2vw,18px);cursor:pointer;text-align:center;transition:all .4s cubic-bezier(.34,1.56,.64,1);position:relative;overflow:hidden;user-select:none;-webkit-user-select:none;-webkit-touch-callout:none}
.oc:active:not(.dis):not(.sel){transform:scale(.97)!important}
.oc.sel{border-color:var(--a);box-shadow:0 0 clamp(12px,3vw,30px) rgba(255,99,72,.2),inset 0 0 clamp(8px,2vw,24px) rgba(255,99,72,.04)}
.oc.sel .orb{animation:os 3s ease-in-out infinite}
.oc.dis{opacity:.12;pointer-events:none;filter:grayscale(.7) brightness(.5);transform:scale(.92)!important;border-color:transparent}
.bp{background:linear-gradient(135deg,var(--a),#e84118);border:none;color:#fff;font-family:inherit;font-weight:600;padding:clamp(10px,2.5vw,14px) clamp(20px,5vw,36px);border-radius:clamp(10px,2vw,14px);font-size:clamp(.85rem,2.5vw,1rem);cursor:pointer;position:relative;overflow:hidden;transition:all .3s;flex-shrink:0}
.bp:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(255,99,72,.35)}
.bp:disabled{opacity:.2;cursor:not-allowed;transform:none!important;box-shadow:none!important}
.bs{background:transparent;border:1.5px solid rgba(255,255,255,.1);color:var(--fg);font-family:inherit;font-weight:500;padding:clamp(10px,2.5vw,14px) clamp(14px,3.5vw,24px);border-radius:clamp(10px,2vw,14px);font-size:clamp(.85rem,2.5vw,1rem);cursor:pointer;transition:all .3s;flex-shrink:0}
.bs:hover{border-color:rgba(255,255,255,.25);background:rgba(255,255,255,.03)}
.pt{height:3px;background:rgba(255,255,255,.06);border-radius:2px;overflow:hidden;flex-shrink:0}
.pf{height:100%;background:linear-gradient(90deg,var(--a),var(--a2));border-radius:2px;transition:width .4s}
.gt{background:linear-gradient(135deg,var(--a),var(--a2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.sp{flex-shrink:0;padding:clamp(4px,1.2vw,8px) clamp(8px,2vw,16px);border-radius:clamp(6px,1.5vw,10px);font-size:clamp(.6rem,1.8vw,.8rem);font-weight:500;border:1.5px solid rgba(255,255,255,.08);background:rgba(255,255,255,.02);color:rgba(255,255,255,.4);cursor:pointer;transition:all .3s;white-space:nowrap;display:flex;align-items:center;gap:4px}
.sp.act{border-color:var(--a);color:var(--fg);background:rgba(255,99,72,.1)}
.sp.dn{border-color:rgba(255,99,72,.3);color:var(--a);background:rgba(255,99,72,.06)}
.sp.lk{opacity:.25;cursor:default;pointer-events:none}
.sp .ck{display:none;color:var(--a);font-weight:700}
.sp.dn .ck{display:inline}
.qc{opacity:0;transform:translateY(12px);animation:su .4s forwards}
@keyframes su{to{opacity:1;transform:translateY(0)}}
.ti{opacity:0;transform:translateX(-10px);animation:tin .35s forwards}
@keyframes tin{to{opacity:1;transform:translateX(0)}}
.de{position:fixed;font-size:clamp(1.2rem,3vw,2rem);opacity:.05;pointer-events:none;animation:df linear infinite;z-index:0}
@keyframes df{0%{transform:translateY(0) rotate(0);opacity:0}8%{opacity:.05}92%{opacity:.05}100%{transform:translateY(-105vh) rotate(360deg);opacity:0}}
.mo{width:clamp(32px,7.5vw,46px);height:clamp(32px,7.5vw,46px);border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:clamp(.9rem,2.8vw,1.2rem);background:radial-gradient(circle at 30% 25%,rgba(255,255,255,.12) 0%,transparent 55%),radial-gradient(circle at 72% 78%,rgba(0,0,0,.4) 0%,transparent 55%),rgba(255,255,255,.02);box-shadow:0 3px 10px rgba(0,0,0,.4),inset 0 1px 3px rgba(255,255,255,.08);animation:mf 4s ease-in-out infinite;flex-shrink:0}
@keyframes mf{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}
.rsc{background:rgba(255,255,255,.02);backdrop-filter:blur(6px);border:1px solid rgba(255,255,255,.05);border-radius:clamp(12px,2.5vw,18px);padding:clamp(12px,3vw,20px)}
.si{overflow-y:auto;overflow-x:hidden;flex:1;min-height:0;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.08) transparent}
.si::-webkit-scrollbar{width:3px}
.si::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:2px}
.sn{display:flex;gap:clamp(4px,1.5vw,8px);overflow-x:auto;flex-shrink:0;padding-bottom:clamp(4px,1.5vw,12px);scrollbar-width:none;-ms-overflow-style:none}
.sn::-webkit-scrollbar{display:none}
@media(prefers-reduced-motion:reduce){.orb,.orb::before,.de,.bl,.mo{animation:none!important}.oc,.bp,.bs,.pf,.sp{transition-duration:.01s!important}.qc,.ti{animation:none!important;opacity:1;transform:none}}
</style>
</head>
