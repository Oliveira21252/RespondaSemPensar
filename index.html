function upP(){var t=totA(),p=Math.round(t/TOT*100);pB.style.width=p+'%';pL.textContent='Etapa '+(cs+1)+' de '+S.length+' \u00B7 '+t+' de '+TOT;pP.textContent=p+'%'}

function rNav(){sN.innerHTML='';for(var i=0;i<S.length;i++){var pill=document.createElement('button');pill.className='sp';var dn=isCmp(i);if(i===cs)pill.classList.add('act');else if(dn)pill.classList.add('dn');else if(i>cs&&!dn)pill.classList.add('lk');pill.innerHTML='<span>'+(i+1)+'.'+S[i].t+'</span><span class="ck">\u2713</span>';if(dn||i<cs)(function(idx){pill.addEventListener('click',function(e){e.preventDefault();e.stopPropagation();cs=idx;rSec();rNav();upP()})})(i);sN.appendChild(pill)}var act=sN.querySelector('.act');if(act)act.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'})}

function rSec(){var sec=S[cs];sT.textContent=sec.ic+' '+sec.t;sS.textContent=sec.sub;qC.innerHTML='';for(var qi=0;qi<sec.q.length;qi++){var q=sec.q[qi],card=document.createElement('div');card.className='qc';card.style.animationDelay=(qi*.06)+'s';var tl=document.createElement('h3');tl.style.cssText='font-size:clamp(.85rem,2.6vw,1.15rem);font-weight:600;margin-bottom:clamp(5px,1.3vw,10px);text-align:center;color:rgba(250,245,239,.9)';tl.textContent=q.t;card.appendChild(tl);var row=document.createElement('div');row.style.cssText='display:grid;grid-template-columns:1fr 1fr;gap:clamp(5px,1.3vw,10px)';for(var oi=0;oi<q.o.length;oi++){var opt=q.o[oi],btn=document.createElement('div');btn.className='oc';btn.setAttribute('role','button');btn.setAttribute('tabindex','0');btn.dataset.qi=qi;btn.dataset.k=opt.k;var prev=sa[cs][qi];if(prev===opt.k)btn.classList.add('sel');else if(prev)btn.classList.add('dis');btn.innerHTML='<div style="display:flex;justify-content:center"><div class="orb" style="animation-delay:'+(-qi*1.1)+'s">'+opt.e+'</div></div><p style="margin-top:clamp(3px,.8vw,7px);font-size:clamp(.7rem,2.1vw,.9rem);font-weight:500;color:rgba(250,245,239,.8)">'+opt.l+'</p>';(function(sidx,qidx,key,el){el.addEventListener('click',function(e){e.preventDefault();e.stopPropagation();selO(sidx,qidx,key,el)});el.addEventListener('keydown',function(e){if(e.key==='Enter'||e.key===' '){e.preventDefault();e.stopPropagation();selO(sidx,qidx,key,el)}})})(cs,qi,opt.k,btn);iT(btn);row.appendChild(btn)}card.appendChild(row);qC.appendChild(card)}btnB.style.display=cs>0?'inline-flex':'none';var last=cs===S.length-1;if(isCmp(cs)){btnN.disabled=false;btnN.textContent=last?'Ver Resultado':'Proxima'}else{btnN.disabled=true;btnN.textContent=last?'Ver Resultado':'Proxima'}upP()}

function selO(si,qi,key,el){if(sa[si][qi])return;sa[si][qi]=key;el.classList.add('sel');var sibs=el.parentElement.children;for(var i=0;i<sibs.length;i++){if(sibs[i].dataset.k!==key)sibs[i].classList.add('dis')}upP();rNav();var last=si===S.length-1;if(isCmp(si)){btnN.disabled=false;btnN.textContent=last?'Ver Resultado':'Proxima'}}

function calcA(si){var sec=S[si],d=[0,0,0],traits=[];for(var qi=0;qi<sec.q.length;qi++){var key=sa[si][qi];if(!key)continue;var opt=null;for(var j=0;j<sec.q[qi].o.length;j++){if(sec.q[qi].o[j].k===key){opt=sec.q[qi].o[j];break}}if(!opt)continue;d[0]+=opt.d[0];d[1]+=opt.d[1];d[2]+=opt.d[2];traits.push({emoji:opt.e,label:opt.l,trait:opt.r})}var ak='';for(var i=0;i<sec.ax.length;i++)ak+=(i>0?'-':'')+(d[i]>=0?sec.ax[i].h:sec.ax[i].l);var arch=sec.ar[ak];if(!arch)arch={t:'Unico',s:'inclassificavel',sm:'Seu perfil nao se encaixa em nenhuma categoria — voce e raro.'};return{archetype:arch,traits:traits}}

function rRes(){rC.innerHTML='';for(var si=0;si<S.length;si++){var sec=S[si],res=calcA(si),card=document.createElement('div');card.className='rsc';card.style.marginBottom='clamp(5px,1.3vw,12px)';var orbsH='';for(var t=0;t<res.traits.length;t++)orbsH+='<div class="mo" style="animation-delay:'+(t*.25)+'s">'+res.traits[t].emoji+'</div>';var traitsH='';for(var t=0;t<res.traits.length;t++){var tr=res.traits[t];traitsH+='<div class="ti" style="display:flex;align-items:flex-start;gap:clamp(5px,1.3vw,10px);padding:clamp(3px,.8vw,6px) 0;'+(t>0?'border-top:1px solid rgba(255,255,255,.05)':'')+';animation-delay:'+(0.12+si*.05+t*.04)+'s"><span style="font-size:clamp(.85rem,2.5vw,1.1rem);flex-shrink:0">'+tr.emoji+'</span><span style="font-size:clamp(.65rem,1.9vw,.8rem);color:rgba(250,245,239,.7);line-height:1.35"><strong style="color:rgba(250,245,239,.9)">'+tr.label+'</strong> — '+tr.trait+'</span></div>'}card.innerHTML='<div style="display:flex;align-items:center;gap:clamp(5px,1.3vw,10px);margin-bottom:clamp(5px,1.2vw,8px)"><span style="font-size:clamp(1rem,2.8vw,1.3rem)">'+sec.ic+'</span><h3 style="font-family:Playfair Display,serif;font-size:clamp(.9rem,2.8vw,1.15rem);font-weight:900">'+sec.t+'</h3></div><div style="display:flex;flex-wrap:wrap;gap:clamp(3px,.8vw,6px);margin-bottom:clamp(5px,1.2vw,8px)">'+orbsH+'</div><h4 class="gt" style="font-weight:700;font-size:clamp(.85rem,2.6vw,1.05rem);margin-bottom:clamp(2px,.4vw,3px)">'+res.archetype.t+'</h4><p style="color:var(--mt);font-size:clamp(.5rem,1.4vw,.6rem);text-transform:uppercase;letter-spacing:.1em;margin-bottom:clamp(3px,.8vw,6px)">'+res.archetype.s+'</p><p style="color:rgba(250,245,239,.8);font-size:clamp(.65rem,1.9vw,.8rem);line-height:1.45;margin-bottom:clamp(5px,1.2vw,8px)">'+res.archetype.sm+'</p><div>'+traitsH+'</div>';rC.appendChild(card)}}

function showP(t){pg0.classList.add('off');pg1.classList.add('off');pg2.classList.add('off');t.classList.remove('off')}

/* ========== EVENTOS ========== */
btnS.addEventListener('click',function(e){e.preventDefault();e.stopPropagation();cs=0;for(var i=0;i<S.length;i++)sa[i]={};rNav();rSec();showP(pg1)});
btnN.addEventListener('click',function(e){e.preventDefault();e.stopPropagation();if(btnN.disabled)return;if(cs<S.length-1){cs++;rNav();rSec()}else{rRes();showP(pg2)}});
btnB.addEventListener('click',function(e){e.preventDefault();e.stopPropagation();if(cs>0){cs--;rNav();rSec()}});
btnR.addEventListener('click',function(e){e.preventDefault();e.stopPropagation();cs=0;for(var i=0;i<S.length;i++)sa[i]={};qC.innerHTML='';showP(pg0)});
</script>
